name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-13
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Download pre-built web frontend
        shell: bash
        run: |
          mkdir -p ../web/dist
          curl -fSL https://github.com/haven-chat-org/web/releases/latest/download/web-dist.tar.gz \
            -o /tmp/web-dist.tar.gz
          tar -xzf /tmp/web-dist.tar.gz -C ../web/dist

      - name: Install desktop dependencies
        run: npm ci

      - name: Build desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Haven Desktop ${{ github.ref_name }}
          releaseBody: "See the assets below to download and install Haven Desktop."
          releaseDraft: false
          prerelease: false
          tauriScript: npx tauri
          args: --target ${{ matrix.target }} --config '{"build":{"beforeBuildCommand":""}}'
